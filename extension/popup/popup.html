<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TweetCheck</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1 class="popup__title">TweetCheck</h1>
      <p class="popup__lede">
        On X, tap <strong>TweetCheck</strong> under a post. <strong>Demo data</strong> for now.
        Each panel section has <strong>How we rate…</strong> with the rules behind every label.
      </p>
      <p class="popup__hint"><code>breaking</code> / <code>hoax</code> in the tweet text → different demo.</p>
      <button type="button" class="popup__btn popup__btn--secondary" id="open-demo">Open panel preview</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
