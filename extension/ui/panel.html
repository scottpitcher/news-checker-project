<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TweetCheck</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="tc-root"></div>
    <script src="mock-data.js"></script>
    <script src="panel.js"></script>
    <script>
      if (new URLSearchParams(location.search).get("demo") === "1") {
        /* panel.js picks up demo=1 */
      } else {
        window.renderTweetCheck({
          claimSummary: "Waiting for content… Click TweetCheck under a post on X, or open Preview panel from the extension popup.",
          corroboration: "unverified",
          disclaimers: [],
          aiRisk: {
            level: "medium",
            headline: "Nothing to analyze yet",
            reasons: [
              "This screen loads real results when the extension sends text to the panel.",
              "On X, click the TweetCheck button under a tweet, or use the popup → Preview panel.",
            ],
          },
          traceability: { score: 0, label: "—", sourcesFound: 0, citationsInTweet: 0, entities: [], notes: [] },
          alternatives: [],
        });
      }
    </script>
  </body>
</html>
