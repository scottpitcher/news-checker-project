<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TweetCheck</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="tc-root"></div>
    <script src="mock-data.js"></script>
    <script src="panel.js"></script>
    <script>
      if (new URLSearchParams(location.search).get("demo") === "1") {
        /* panel.js picks up demo=1 */
      } else {
        window.renderTweetCheck({
          claimSummary: "Open from a post on X (or the extension → Open panel preview).",
          corroboration: "unverified",
          disclaimers: [],
          aiRisk: {
            level: "medium",
            headline: "Waiting",
            reasons: ["Tap TweetCheck under a tweet on X."],
          },
          traceability: { score: 0, label: "—", sourcesFound: 0, citationsInTweet: 0, entities: [], notes: [] },
          alternatives: [],
        });
      }
    </script>
  </body>
</html>
